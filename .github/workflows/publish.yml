# Publishes to PyPI on every GitHub Release (or a pushed v* tag) using PyPI
# Trusted Publishing (OIDC) — no API token stored in the repo.
#
# One-time setup on PyPI: project → Publishing → add a GitHub publisher with
#   owner: finansfatura   repo: ff-python   workflow: publish.yml
# Then create a Release (or push a tag like v0.1.0) to trigger it.
name: publish

on:
  release:
    types: [published]
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python -m pytest -q

  build-and-publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build
      - run: python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
